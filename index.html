<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Factory — Дизайн интерьера за 30 секунд</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0f0f0f;
    color: #f0ece4;
    min-height: 100vh;
  }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px 20px;
    position: relative;
    background: linear-gradient(160deg, #0f0f0f 0%, #1a1510 50%, #0f0f0f 100%);
  }

  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 60% 40%, rgba(180,140,90,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #b48c5a;
    margin-bottom: 48px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 7vw, 88px);
    font-weight: 400;
    line-height: 1.08;
    letter-spacing: -1px;
    max-width: 820px;
    margin-bottom: 24px;
  }

  h1 em {
    font-style: italic;
    color: #b48c5a;
  }

  .subtitle {
    font-size: 16px;
    font-weight: 300;
    color: #888;
    max-width: 480px;
    line-height: 1.7;
    margin-bottom: 64px;
  }

  /* UPLOAD BLOCK */
  .upload-section {
    background: #161410;
    border: 1px solid #2a2520;
    border-radius: 20px;
    padding: 48px;
    width: 100%;
    max-width: 600px;
    position: relative;
  }

  .upload-zone {
    border: 1.5px dashed #3a3028;
    border-radius: 12px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 24px;
    background: #0f0d0b;
  }

  .upload-zone:hover {
    border-color: #b48c5a;
    background: #131109;
  }

  .upload-zone.has-image {
    border-color: #b48c5a;
    border-style: solid;
    padding: 0;
    overflow: hidden;
  }

  .upload-zone.has-image img {
    width: 100%;
    max-height: 280px;
    object-fit: cover;
    display: block;
    border-radius: 11px;
  }

  .upload-icon {
    font-size: 36px;
    margin-bottom: 12px;
    display: block;
  }

  .upload-text {
    font-size: 15px;
    color: #666;
    margin-bottom: 6px;
  }

  .upload-hint {
    font-size: 12px;
    color: #444;
  }

  #fileInput { display: none; }

  /* STYLE SELECT */
  .style-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 12px;
    display: block;
  }

  .styles-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 28px;
  }

  .style-btn {
    background: #0f0d0b;
    border: 1px solid #2a2520;
    border-radius: 8px;
    padding: 10px 8px;
    font-size: 12px;
    color: #888;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }

  .style-btn:hover {
    border-color: #b48c5a;
    color: #f0ece4;
  }

  .style-btn.active {
    border-color: #b48c5a;
    background: rgba(180,140,90,0.08);
    color: #b48c5a;
  }

  /* GENERATE BUTTON */
  .generate-btn {
    width: 100%;
    background: #b48c5a;
    color: #0f0f0f;
    border: none;
    border-radius: 10px;
    padding: 16px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .generate-btn:hover:not(:disabled) {
    background: #c9a06a;
    transform: translateY(-1px);
  }

  .generate-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  /* RESULT */
  .result-section {
    margin-top: 32px;
    display: none;
  }

  .result-section.visible {
    display: block;
  }

  .result-section img {
    width: 100%;
    border-radius: 12px;
    display: block;
  }

  .result-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 12px;
    display: block;
    text-align: center;
  }

  .download-btn {
    display: block;
    margin-top: 16px;
    text-align: center;
    background: transparent;
    border: 1px solid #2a2520;
    color: #888;
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
    text-decoration: none;
  }

  .download-btn:hover {
    border-color: #b48c5a;
    color: #b48c5a;
  }

  /* LOADING */
  .loading {
    display: none;
    text-align: center;
    padding: 32px 0;
    color: #555;
    font-size: 14px;
  }

  .loading.visible { display: block; }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid #2a2520;
    border-top-color: #b48c5a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ERROR */
  .error-msg {
    background: rgba(180,60,60,0.1);
    border: 1px solid rgba(180,60,60,0.2);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: #e07070;
    margin-top: 16px;
    display: none;
  }

  .error-msg.visible { display: block; }

  /* FOOTER */
  .footer {
    text-align: center;
    padding: 40px 20px;
    color: #333;
    font-size: 12px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<section class="hero">
  <div class="logo">Room Factory</div>

  <h1>Дизайн вашей комнаты<br><em>за 30 секунд</em></h1>
  <p class="subtitle">Загрузите фото — искусственный интеллект создаст интерьер в любом стиле</p>

  <div class="upload-section">

    <!-- Зона загрузки фото -->
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <span class="upload-icon">📷</span>
      <p class="upload-text">Нажмите чтобы загрузить фото комнаты</p>
      <p class="upload-hint">JPG или PNG, до 10 МБ</p>
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <!-- Выбор стиля -->
    <span class="style-label">Выберите стиль</span>
    <div class="styles-grid">
      <button class="style-btn active" data-style="scandinavian interior design, light wood, white walls, minimalist, cozy">Скандинавский</button>
      <button class="style-btn" data-style="modern minimalist interior, concrete, glass, steel, clean lines">Минимализм</button>
      <button class="style-btn" data-style="loft industrial interior, exposed brick, metal, dark tones">Лофт</button>
      <button class="style-btn" data-style="classic luxury interior, rich wood, elegant furniture, warm lighting">Классика</button>
      <button class="style-btn" data-style="japandi interior design, natural materials, zen, neutral tones">Japandi</button>
      <button class="style-btn" data-style="bohemian eclectic interior, colorful, plants, vintage furniture">Бохо</button>
    </div>

    <!-- Кнопка -->
    <button class="generate-btn" id="generateBtn" disabled>
      Загрузите фото для генерации
    </button>

    <!-- Загрузка -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      Создаём ваш дизайн...
    </div>

    <!-- Ошибка -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- Результат -->
    <div class="result-section" id="resultSection">
      <span class="result-label">Ваш новый интерьер</span>
      <img id="resultImg" src="" alt="Результат">
      <a class="download-btn" id="downloadBtn" download="roomfactory-design.jpg">
        Скачать изображение
      </a>
    </div>

  </div>
</section>

<footer class="footer">© 2026 Room Factory</footer>

<script>
  // Ваш Stability AI ключ — замените на реальный!
  const STABILITY_KEY = 'ВАШ_STABILITY_КЛЮЧ';

  let selectedFile = null;
  let selectedStyle = 'scandinavian interior design, light wood, white walls, minimalist, cozy';

  // Выбор стиля
  document.querySelectorAll('.style-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedStyle = btn.dataset.style;
    });
  });

  // Загрузка фото
  document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    selectedFile = file;

    const reader = new FileReader();
    reader.onload = (ev) => {
      const zone = document.getElementById('uploadZone');
      zone.classList.add('has-image');
      zone.innerHTML = `<img src="${ev.target.result}" alt="Ваша комната">`;
    };
    reader.readAsDataURL(file);

    const btn = document.getElementById('generateBtn');
    btn.disabled = false;
    btn.textContent = 'Создать дизайн';
  });

  // Drag & drop
  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.style.borderColor = '#b48c5a'; });
  zone.addEventListener('dragleave', () => { zone.style.borderColor = ''; });
  zone.addEventListener('drop', (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file) {
      document.getElementById('fileInput').files = e.dataTransfer.files;
      document.getElementById('fileInput').dispatchEvent(new Event('change'));
    }
  });

  // Генерация
  document.getElementById('generateBtn').addEventListener('click', async () => {
    if (!selectedFile) return;

    const loading = document.getElementById('loading');
    const result = document.getElementById('resultSection');
    const error = document.getElementById('errorMsg');
    const btn = document.getElementById('generateBtn');

    loading.classList.add('visible');
    result.classList.remove('visible');
    error.classList.remove('visible');
    btn.disabled = true;
    btn.textContent = 'Создаём...';

    try {
      const formData = new FormData();
      formData.append('image', selectedFile);
      formData.append('prompt', selectedStyle + ', professional interior photography, high quality, photorealistic');
      formData.append('control_strength', '0.7');
      formData.append('output_format', 'jpeg');

      const response = await fetch('https://api.stability.ai/v2beta/stable-image/control/structure', {
        method: 'POST',
        headers: {
          'authorization': `Bearer ${STABILITY_KEY}`,
          'accept': 'image/*'
        },
        body: formData
      });

      if (!response.ok) {
        const text = await response.text();
        throw new Error(`Ошибка: ${response.status}`);
      }

      const blob = await response.blob();
      const url = URL.createObjectURL(blob);

      document.getElementById('resultImg').src = url;
      document.getElementById('downloadBtn').href = url;
      result.classList.add('visible');

    } catch (err) {
      error.textContent = 'Не удалось создать дизайн. Попробуйте ещё раз.';
      error.classList.add('visible');
    } finally {
      loading.classList.remove('visible');
      btn.disabled = false;
      btn.textContent = 'Создать дизайн';
    }
  });
</script>

</body>
</html>
